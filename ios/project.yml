name: MobileClaw
options:
  bundleIdPrefix: com.mobileclaw
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "16.0"
  createIntermediateGroups: true

targets:
  MobileClaw:
    type: application
    platform: iOS
    sources:
      - MobileClaw
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.mobileclaw.app
        INFOPLIST_FILE: MobileClaw/Resources/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        SWIFT_VERSION: "6.0"
        DEVELOPMENT_TEAM: ""
        CODE_SIGN_IDENTITY: "Apple Development"
        CODE_SIGN_STYLE: Automatic
        TARGETED_DEVICE_FAMILY: "1"
        SUPPORTS_MAC_DESIGNED_FOR_IPHONE_IPAD: false
        ENABLE_PREVIEWS: true
